{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>Nuevo pedido manual</h2>
  <form method="post" action="/admin/pedidos/nuevo">
    <p>
      <label>Cliente</label><br>
      <input style="max-width:400px;width:100%" type="text" name="customer_name" required>
    </p>

    <p>
      <label>Lugar de entrega (opcional)</label><br>
      <input style="max-width:500px;width:100%" type="text" name="delivery_place" placeholder="Ej. Bodega de Julio">
    </p>

    <table>
      <thead>
        <tr>
          <th>Producto</th>
          <th>Tipo precio</th>
          <th>Cantidad</th>
        </tr>
      </thead>
      <tbody>
      {% for i in range(8) %}
        <tr>
          <td>
            <select name="product_ids">
              <option value="">-- seleccionar --</option>
              {% for p in products %}
                <option value="{{ p.id }}">{{ p.name }}</option>
              {% endfor %}
            </select>
          </td>
          <td>
            <select name="price_types">
              <option value="kg_suelto">Kg suelto</option>
              <option value="kg_10plus">10kg o mas</option>
              <option value="bulk">Arpilla/bulto/caja</option>
            </select>
          </td>
          <td>
            <input type="number" step="0.01" name="quantities" placeholder="0">
          </td>
        </tr>
      {% endfor %}
      </tbody>
    </table>

    <br>
    <button class="btn">Crear pedido</button>
  </form>
</div>
{% endblock %}
