{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>Precios e inventario</h2>
  <p class="muted">Actualiza precios y disponibilidad del dia.</p>

  <form method="post" action="/admin/productos/guardar">
    <div class="product-grid">
      {% for p in products %}
      <div class="product-card">
        <div class="product-head">
          <h3>{{ p.name }}</h3>
          <label class="switch-row">
            <input type="hidden" name="available_status" value="{{ 1 if p.available else 0 }}">
            <input type="checkbox" onchange="this.previousElementSibling.value = this.checked ? 1 : 0" {% if p.available %}checked{% endif %}>
            Disponible
          </label>
        </div>

        <input type="hidden" name="product_ids" value="{{ p.id }}">

        <label>Kg suelto (&lt;10kg)</label>
        <input type="number" step="0.01" name="price_kg_loose" value="{{ p.price_kg_loose }}">

        <label>10kg o mas</label>
        <input type="number" step="0.01" name="price_kg_10plus" value="{{ p.price_kg_10plus }}">

        <label>Arpilla / bulto / caja por kg</label>
        <input type="number" step="0.01" name="price_kg_bulk" value="{{ p.price_kg_bulk }}">

        <label>Etiqueta</label>
        <input type="text" name="bulk_label" value="{{ p.bulk_label }}">
      </div>
      {% endfor %}
    </div>

    <div class="sticky-save">
      <button class="btn big-btn">Guardar cambios</button>
    </div>
  </form>
</div>
{% endblock %}
