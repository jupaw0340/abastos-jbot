<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>{{ app_name }} - Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#0f3d22;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .box{background:white;border-radius:18px;padding:28px;width:90%;max-width:380px;box-shadow:0 10px 30px #0005}
    h1{margin-top:0;color:#14532d}
    input{width:100%;box-sizing:border-box;padding:14px;border:1px solid #d1d5db;border-radius:10px;font-size:18px}
    button{width:100%;margin-top:14px;border:0;border-radius:10px;padding:14px;font-size:18px;font-weight:bold;background:#15803d;color:white;cursor:pointer}
    .error{background:#fee2e2;color:#991b1b;padding:10px;border-radius:10px;margin-bottom:12px}
  </style>
</head>
<body>
  <div class="box">
    <h1>Abastos JBot</h1>
    <p>Entrar al sistema interno</p>
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login">
      <input type="password" name="password" placeholder="Contrasena" autofocus>
      <button>Entrar</button>
    </form>
  </div>
</body>
</html>
